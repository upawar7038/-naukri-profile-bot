name: 🤖 Naukri Profile Auto-Updater

on:
  schedule:
    # Runs every 2 hours — stays well within 2000 free minutes/month
    # Cron format: minute hour day month weekday
    - cron: '0 */2 * * *'

  # Allows you to trigger manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-naukri-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # kill job if it hangs beyond 10 min

    steps:
      # ── 1. Checkout your code ──────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Restore variant state from cache ───────────────────
      #    This remembers which headline/summary variant to use next
      - name: 📂 Restore variant state
        uses: actions/cache@v4
        with:
          path: state.json
          key: naukri-bot-state-${{ github.run_number }}
          restore-keys: |
            naukri-bot-state-

      # ── 3. Set up Node.js ──────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install npm dependencies ────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── 5. Install Puppeteer / Chrome system dependencies ──────
      - name: 🌐 Install Puppeteer system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgbm-dev \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            fonts-liberation \
            wget \
            ca-certificates

      # ── 6. Run the bot (single update + exit) ─────────────────
      - name: 🚀 Run Naukri Profile Bot
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: node bot.js --once

      # ── 7. Save updated variant state to cache ────────────────
      - name: 💾 Save variant state
        if: always()    # save even if bot step fails
        uses: actions/cache@v4
        with:
          path: state.json
          key: naukri-bot-state-${{ github.run_number }}

      # ── 8. Upload screenshots if something went wrong ─────────
      - name: 📸 Upload error screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: '*.png'
          retention-days: 3
